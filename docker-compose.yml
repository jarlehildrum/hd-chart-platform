version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hd-postgres
    restart: always
    environment:
      POSTGRES_DB: hdplatform
      POSTGRES_USER: hduser
      POSTGRES_PASSWORD: hdplatform123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - hd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hduser -d hdplatform"]
      interval: 30s
      timeout: 10s
      retries: 3

  # HD Platform API
  hd-platform:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hd-platform-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - DATABASE_URL=Host=postgres;Port=5432;Database=hdplatform;Username=hduser;Password=hdplatform123
      - HD_ADMIN_SECRET=hd_admin_536290824388ea22
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      - DataDirectory=/app/data
    volumes:
      - hd_data:/app/data
      - hd_logs:/app/logs
    ports:
      - "8090:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hd-network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Analytics Dashboard
  grafana:
    image: grafana/grafana:10.2.0
    container_name: hd-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=hdplatform123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_USERS_AUTO_ASSIGN_ORG=true
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Viewer
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://localhost:3000/
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-worldmap-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hd-network
    user: "0"

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: hd-redis
    restart: always
    command: redis-server --requirepass hdplatform123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hd-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: hd-nginx
    restart: always
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - hd-platform
      - grafana
    networks:
      - hd-network

volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  hd_data:
    driver: local
  hd_logs:
    driver: local

networks:
  hd-network:
    driver: bridge

# Environment variables template
# Create a .env file with these values:
#
# STRIPE_SECRET_KEY=sk_live_your_stripe_secret_key
# STRIPE_WEBHOOK_SECRET=whsec_your_webhook_secret
# HD_ADMIN_SECRET=your_super_secure_admin_secret
# POSTGRES_PASSWORD=your_secure_postgres_password
# GRAFANA_PASSWORD=your_grafana_admin_password